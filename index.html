<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM INITIALIZATION | Solo Leveling RPG</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #0088cc;
            --neon-cyan: #00f0ff;
            --neon-cyan-dim: rgba(0, 240, 255, 0.4);
            --dark-bg: #030712;
            --panel-bg: rgba(5, 10, 20, 0.85);
            --border-glow: rgba(0, 240, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--dark-bg);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ===== Background Effects ===== */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridPulse 6s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes gridPulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.5; }
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-cyan);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Scanlines */
        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 240, 255, 0.02) 2px,
                rgba(0, 240, 255, 0.02) 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        /* Vignette */
        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
            z-index: 5;
        }

        /* ===== Main Container ===== */
        .system-container {
            position: relative;
            z-index: 20;
            width: 90%;
            max-width: 550px;
            perspective: 1000px;
        }

        /* ===== Boot Sequence (Phase 1) ===== */
        .boot-sequence {
            text-align: center;
            padding: 40px;
        }

        .system-logo {
            font-family: 'Orbitron', monospace;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan-dim);
            letter-spacing: 8px;
            margin-bottom: 10px;
            opacity: 0;
            animation: logoReveal 2s ease-out 0.5s forwards;
        }

        .system-subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 4px;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        .system-version {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: rgba(0, 240, 255, 0.4);
            margin-top: 8px;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 1s ease-out 2s forwards;
        }

        /* Loading Bar */
        .loading-container {
            margin-top: 40px;
            opacity: 0;
            animation: fadeIn 1s ease-out 2.5s forwards;
        }

        .loading-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            color: var(--neon-cyan);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loading-bar-outer {
            width: 100%;
            height: 2px;
            background: rgba(0, 240, 255, 0.1);
            position: relative;
        }

        .loading-bar-inner {
            height: 100%;
            width: 0%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: loadProgress 3s ease-in-out 3s forwards;
        }

        .loading-percent {
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            color: white;
        }

        /* Boot Text */
        .boot-text {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: rgba(0, 240, 255, 0.5);
            margin-top: 20px;
            min-height: 80px;
            text-align: right;
            direction: rtl;
            line-height: 1.8;
        }

        /* ===== The Gate (Phase 2) ===== */
        .gate-container {
            display: none;
            position: relative;
            padding: 20px;
        }

        .gate-frame {
            position: relative;
            border: 1px solid var(--border-glow);
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            padding: 40px 35px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 240, 255, 0.05);
        }

        .gate-frame::before {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(45deg, transparent, var(--neon-cyan-dim), transparent);
            background-size: 200% 200%;
            animation: borderShimmer 4s ease infinite;
            z-index: -1;
        }

        @keyframes borderShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Corner Decorations */
        .corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 1px solid var(--neon-cyan);
        }
        .corner-tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
        .corner-tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
        .corner-br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

        /* Gate Header */
        .gate-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .gate-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan-dim);
        }

        .gate-title {
            font-family: 'Cairo', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: white;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .gate-subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--neon-cyan);
            letter-spacing: 2px;
        }

        /* Form */
        .player-form {
            margin-top: 20px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
        }

        .input-group label span {
            color: var(--neon-cyan);
            margin-left: 5px;
        }

        .neon-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 240, 255, 0.2);
            color: var(--neon-cyan);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .neon-input::placeholder {
            color: rgba(0, 240, 255, 0.2);
            font-weight: 300;
        }

        .neon-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1);
            background: rgba(0, 20, 40, 0.6);
        }

        .input-line {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: var(--neon-cyan);
            transition: all 0.4s ease;
        }

        .neon-input:focus ~ .input-line {
            left: 0;
            width: 100%;
            box-shadow: 0 0 8px var(--neon-cyan);
        }

        /* Submit Button */
        .system-btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .system-btn:hover {
            background: rgba(0, 240, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            text-shadow: 0 0 8px var(--neon-cyan);
            transform: translateY(-1px);
        }

        .system-btn:active {
            transform: translateY(0);
        }

        /* Decorative Lines */
        .deco-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.3), transparent);
            margin: 20px 0;
        }

        /* Warning Text */
        .system-warning {
            font-family: 'Cairo', sans-serif;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            margin-top: 20px;
            line-height: 1.6;
        }

        /* Animations */
        @keyframes logoReveal {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); filter: blur(5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes gateOpen {
            0% { opacity: 0; transform: scale(0.95); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        /* Glitch Effect for Title - Simplified */
        .glitch {
            position: relative;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; opacity: 0.5;
        }
        .glitch::before {
            color: #fff;
            z-index: -1;
            animation: glitch-anim 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(0); }
            20% { transform: translateX(-2px); }
            40% { transform: translateX(2px); }
        }

    </style>
<base target="_blank">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="particles" id="particles"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="system-container">
        <div class="boot-sequence" id="bootSequence">
            <div class="system-logo glitch" data-text="SOLO LEVELING">SOLO LEVELING</div>
            <div class="system-subtitle">PLAYER INITIALIZATION</div>
            <div class="system-version">SYSTEM CORE v2.0</div>

            <div class="loading-container">
                <div class="loading-label">
                    <span>CONNECTING...</span>
                    <span class="loading-percent" id="loadPercent">0%</span>
                </div>
                <div class="loading-bar-outer">
                    <div class="loading-bar-inner" id="loadBar"></div>
                </div>
            </div>

            <div class="boot-text" id="bootText"></div>
        </div>

        <div class="gate-container" id="gateContainer">
            <div class="gate-frame">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>

                <div class="gate-header">
                    <span class="gate-icon">⟡</span>
                    <div class="gate-title">تسجيل اللاعب</div>
                    <div class="gate-subtitle">SOVEREIGN PROTOCOL</div>
                </div>

                <div class="deco-line"></div>

                <form class="player-form" id="playerForm" onsubmit="return handleSubmit(event)">
                    <div class="input-group">
                        <label>اللقب والإسم الحقيقي <span>*</span></label>
                        <input type="text" class="neon-input" id="playerName" placeholder="أدخل اسمك الحقيقي..." autocomplete="off" required maxlength="25">
                        <div class="input-line"></div>
                    </div>

                    <div class="input-group">
                        <label>اللقب السيادي <span>*</span></label>
                        <input type="text" class="neon-input" id="playerTitle" placeholder="مثال: عاهل الظلال..." autocomplete="off" required maxlength="25">
                        <div class="input-line"></div>
                    </div>

                    <button type="submit" class="system-btn" id="submitBtn">
                        تفعيل النظام
                    </button>
                </form>

                <div class="system-warning">
                    [ ملاحظة ] هذه البيانات ستشكل هويتك داخل النظام السيادي.
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== Particle System =====
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30;
            for (let i = 0; i < particleCount; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (Math.random() * 8 + 5) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(p);
            }
        }

        // ===== Boot Sequence =====
        const bootMessages = [
            '> تهيئة مسار الطاقة...',
            '> فحص البوابات المتاحة...',
            '> مصادقة بروتوكول اللاعب...',
            '> جاهز للاتصال.'
        ];

        function runBootSequence() {
            const bootText = document.getElementById('bootText');
            const loadPercent = document.getElementById('loadPercent');

            let percent = 0;
            const percentInterval = setInterval(() => {
                percent += Math.floor(Math.random() * 5) + 1;
                if (percent >= 100) {
                    percent = 100;
                    clearInterval(percentInterval);
                }
                loadPercent.textContent = percent + '%';
            }, 80);

            bootMessages.forEach((msg, index) => {
                setTimeout(() => {
                    const line = document.createElement('div');
                    line.textContent = msg;
                    line.style.opacity = '0';
                    line.style.animation = 'fadeIn 0.5s ease forwards';
                    bootText.appendChild(line);
                }, 2000 + (index * 600));
            });

            setTimeout(() => {
                transitionToGate();
            }, 5500);
        }

        function transitionToGate() {
            const bootSequence = document.getElementById('bootSequence');
            const gateContainer = document.getElementById('gateContainer');

            bootSequence.style.transition = 'all 0.8s ease';
            bootSequence.style.opacity = '0';
            bootSequence.style.transform = 'scale(0.95)';

            setTimeout(() => {
                bootSequence.style.display = 'none';
                gateContainer.style.display = 'block';
                gateContainer.style.animation = 'gateOpen 1s ease-out forwards';

                setTimeout(() => {
                    document.getElementById('playerName').focus();
                }, 1000);
            }, 800);
        }

        // ===== Form Handling =====
        function handleSubmit(e) {
            e.preventDefault();

            const name = document.getElementById('playerName').value.trim();
            const title = document.getElementById('playerTitle').value.trim();
            const btn = document.getElementById('submitBtn');

            if (!name || !title) {
                alert('يرجى ملء جميع الحقول المطلوبة');
                return false;
            }

            btn.textContent = 'جاري التفعيل...';
            btn.style.pointerEvents = 'none';
            btn.style.background = 'rgba(0, 240, 255, 0.2)';

            const playerData = {
                name: name,
                title: title,
                registeredAt: new Date().toISOString(),
                level: 1,
                exp: 0
            };

            localStorage.setItem('sl_player_data', JSON.stringify(playerData));
            localStorage.setItem('sl_onboarding_complete', 'true');

            // Bridge to index11.html system
            const monarchData = {
                name: name,
                title: title,
                level: 1,
                xp: 0,
                gold: 0,
                authority: 0,
                lethality: 0,
                stats: { str: 10, vit: 10, agi: 10, int: 10, sen: 10 },
                inventory: [],
                avatar: "",
                registeredAt: new Date().toISOString()
            };
            localStorage.setItem('monarch_system_data', JSON.stringify(monarchData));

            setTimeout(() => {
                btn.textContent = 'تم التفعيل!';
                btn.style.borderColor = '#00f0ff';
                btn.style.boxShadow = '0 0 20px rgba(0, 240, 255, 0.4)';

                setTimeout(() => {
                    window.location.href = 'index11.html'; // الانتقال للوحة التحكم الرئيسية
                }, 1000);
            }, 1000);

            return false;
        }

        // ===== Init =====
        document.addEventListener('DOMContentLoaded', () => {
            // التحقق مما إذا كان المستخدم مسجلاً مسبقاً للقفز مباشرة إلى اللوحة
            if(localStorage.getItem('sl_onboarding_complete') === 'true') {
                window.location.href = 'index11.html';
                return;
            }
            createParticles();
            runBootSequence();
        });
    </script>
</body>
</html>
