<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام العاهل - الأرشيف السماوي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --system-blue: #00e5ff;
            --system-dark: rgba(10, 14, 23, 0.98);
            --system-border: #0077ff;
            --system-glow: 0 0 15px rgba(0, 229, 255, 0.4);
            --system-text: #e0f7fa;
            --gold-accent: #ffd700;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #050505;
            background-image: radial-gradient(circle at top, #0a1128 0%, #000000 100%);
            color: var(--system-text);
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* تخصيص شريط التمرير */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--system-blue);
            border-radius: 10px;
        }

        /* نافذة النظام المتجاوبة */
        .system-window {
            background: var(--system-dark);
            border: 1px solid var(--system-border);
            border-radius: 8px;
            box-shadow: var(--system-glow), inset 0 0 20px rgba(0, 119, 255, 0.1);
            width: 100%;
            max-width: 750px; /* زيادة العرض قليلاً لتستغل الشاشات الكبيرة */
            height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .system-header {
            text-align: center;
            font-family: 'Share Tech Mono', 'Cairo', monospace;
            font-size: 1.1rem;
            color: var(--system-blue);
            letter-spacing: 2px;
            padding: 15px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.3);
            background: rgba(0, 229, 255, 0.05);
            text-shadow: 0 0 8px var(--system-blue);
        }

        .search-container {
            padding: 12px 15px;
            border-bottom: 1px dashed var(--system-border);
        }

        .system-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--system-blue);
            color: var(--system-blue);
            padding: 10px 15px;
            border-radius: 4px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .system-input:focus {
            box-shadow: var(--system-glow);
        }

        /* قائمة السور الديناميكية الذكية */
        .surah-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            list-style: none;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .surah-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 229, 255, 0.15);
            padding: 12px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .surah-card:hover {
            background: rgba(0, 229, 255, 0.08);
            border-color: var(--system-blue);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
            transform: translateY(-2px);
        }

        .surah-number {
            font-family: 'Share Tech Mono', monospace;
            color: rgba(0, 229, 255, 0.6);
            font-size: 0.85rem;
        }

        /* واجهة القراءة */
        .reader-view {
            display: none;
            flex-direction: column;
            height: 100%;
            background: var(--system-dark);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
        }

        .reader-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid var(--system-border);
            background: rgba(0, 0, 0, 0.8);
            gap: 10px;
        }

        #current-surah-title {
            font-weight: bold;
            color: var(--system-blue);
            font-size: 1.1rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-system {
            background: transparent;
            border: 1px solid var(--system-blue);
            color: var(--system-blue);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-system:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: var(--system-glow);
        }

        .ayah-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px 25px;
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            line-height: 2.3;
            text-align: justify;
            word-spacing: 2px;
        }

        .ayah-text {
            display: inline;
            transition: color 0.2s;
        }

        .ayah-text:hover {
            color: var(--system-blue);
        }

        .ayah-number {
            display: inline-block;
            width: 28px;
            height: 28px;
            line-height: 26px;
            text-align: center;
            border: 1px solid var(--gold-accent);
            border-radius: 50%;
            font-size: 0.8rem;
            color: var(--gold-accent);
            margin: 0 6px;
            font-family: 'Cairo', sans-serif;
        }

        .audio-player {
            padding: 12px;
            border-top: 1px solid var(--system-border);
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
        }

        audio {
            width: 100%;
            height: 36px;
            outline: none;
        }

        /* الاستدعاءات البرمجية للتجاوب (Media Queries) */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }
            .system-window {
                height: 100vh;
                width: 100vw;
                border: none;
                border-radius: 0;
            }
            .surah-list {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 8px;
                padding: 10px;
            }
            .ayah-container {
                font-size: 1.4rem;
                line-height: 2;
                padding: 15px;
            }
            .btn-system {
                padding: 5px 8px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 400px) {
            .surah-list {
                grid-template-columns: 1fr; /* عمود واحد للهواتف الصغيرة جداً */
            }
            #current-surah-title {
                font-size: 0.95rem;
            }
        }

        /* نظام الإشعارات وشاشة التحميل */
        .system-toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 119, 255, 0.1);
            border: 1px solid var(--system-blue);
            color: var(--system-blue);
            padding: 10px 20px;
            border-radius: 4px;
            box-shadow: var(--system-glow);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            font-size: 0.9rem;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .system-toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--system-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            color: var(--system-blue);
            font-family: 'Share Tech Mono', monospace;
            display: none;
            letter-spacing: 2px;
        }
    </style>
</head>

           <div > <button onclick="window.location.href='index.html';" class="system-header"  >

    <div class="system-toast" id="toast">[ تم حفظ تقدمك بنجاح ]</div>

    <script>
        const API_BASE = "https://api.alquran.cloud/v1";
        let allSurahs = [];
        let currentSurahId = null;

        document.addEventListener("DOMContentLoaded", async () => {
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/surah`);
                const data = await response.json();
                allSurahs = data.data;
                renderSurahs(allSurahs);
            } catch (error) {
                console.error("Error:", error);
                showToast("فشل في الاتصال بقاعدة البيانات السماوية");
            }
            showLoading(false);
        });

        function renderSurahs(surahs) {
            const listElement = document.getElementById("surah-list");
            listElement.innerHTML = "";
            
            surahs.forEach(surah => {
                const li = document.createElement("li");
                li.className = "surah-card";
                li.onclick = () => openSurah(surah.number, surah.name);
                li.innerHTML = `
                    <span class="surah-number">${surah.number.toString().padStart(3, '0')}</span>
                    <span style="font-weight: bold;">${surah.name}</span>
                `;
                listElement.appendChild(li);
            });
        }

        function filterSurahs() {
            const query = document.getElementById("search-input").value;
            const cleanQuery = query.replace(/[\u064B-\u065F]/g, '');
            
            const filtered = allSurahs.filter(surah => {
                const cleanName = surah.name.replace(/[\u064B-\u065F]/g, '');
                return cleanName.includes(cleanQuery);
            });
            renderSurahs(filtered);
        }

        async function openSurah(number, name) {
            showLoading(true);
            currentSurahId = number;
            document.getElementById("current-surah-title").innerText = name;
            
            try {
                const response = await fetch(`${API_BASE}/surah/${number}/ar.alafasy`);
                const data = await response.json();
                const ayahs = data.data.ayahs;

                const container = document.getElementById("ayah-container");
                container.innerHTML = "";

                if (number !== 1 && number !== 9) {
                    container.innerHTML = `<div style="text-align: center; margin-bottom: 20px; color: var(--system-blue); font-size: 1.3rem;">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;
                }

                ayahs.forEach(ayah => {
                    let text = ayah.text;
                    if (number !== 1 && ayah.numberInSurah === 1) {
                        text = text.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "").trim();
                    }

                    container.innerHTML += `
                        <span class="ayah-text" id="ayah-${ayah.numberInSurah}" onclick="playAyah('${ayah.audio}')" style="cursor:pointer;" title="انقر للاستماع للآية">
                            ${text}
                        </span>
                        <span class="ayah-number">${ayah.numberInSurah}</span>
                    `;
                });

                const audioPlayer = document.getElementById("quran-audio");
                const surahFormatted = number.toString().padStart(3, '0');
                audioPlayer.src = `https://server8.mp3quran.net/afs/${surahFormatted}.mp3`;

                document.getElementById("main-view").style.display = "none";
                document.getElementById("reader-view").style.display = "flex";

                // جعل السورة تبدأ من الأعلى دائماً عند الفتح
                document.getElementById("ayah-container").scrollTop = 0;

            } catch (error) {
                console.error("Error:", error);
                showToast("حدث خطأ أثناء فك تشفير البيانات");
            }
            showLoading(false);
        }

        function closeReader() {
            document.getElementById("quran-audio").pause();
            document.getElementById("reader-view").style.display = "none";
            document.getElementById("main-view").style.display = "flex";
            currentSurahId = null;
        }

        function playAyah(audioUrl) {
            const audioPlayer = document.getElementById("quran-audio");
            audioPlayer.src = audioUrl;
            audioPlayer.play();
        }

        function saveBookmark() {
            if (!currentSurahId) return;
            
            const bookmarkData = {
                surahId: currentSurahId,
                surahName: document.getElementById("current-surah-title").innerText
            };
            
            localStorage.setItem("monarch_quran_bookmark", JSON.stringify(bookmarkData));
            showToast("[ تم تحديث نقطة الحفظ بنجاح ]");
        }

        function loadBookmark() {
            const saved = localStorage.getItem("monarch_quran_bookmark");
            if (saved) {
                const data = JSON.parse(saved);
                openSurah(data.surahId, data.surahName);
                showToast("[ تم استرجاع البيانات بنجاح ]");
            } else {
                showToast("[ لا توجد نقطة حفظ سابقة ]");
            }
        }

        function showLoading(show) {
            document.getElementById("loading").style.display = show ? "flex" : "none";
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }
        const UI = {
    toggleTimerSettings() {
        if (typeof SoundEffects !== 'undefined') SoundEffects.playSystemClick();
        document.getElementById('timerModal').classList.toggle('hidden');
    }
};

const Toast = {
    show(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        if (!container) return;
        const toast = document.createElement('div');
        const colors = {
            success: 'border-emerald-500 text-emerald-400 shadow-[0_0_15px_rgba(16,185,129,0.3)]',
            error: 'border-rose-500 text-rose-400 shadow-[0_0_15px_rgba(225,29,72,0.3)]',
            info: 'border-[var(--sys-cyan)] text-[var(--sys-cyan)] shadow-[0_0_15px_rgba(0,240,255,0.3)]'
        };
        toast.className = `pointer-events-auto px-5 py-3 bg-[#02040a]/95 border backdrop-blur-md text-sm font-bold sys-font tracking-wide animate-system-pop ${colors[type] || colors.info}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
    }
};

// SYSTEM RESET ENGINE (HARD RESET)
// ==========================================
const SystemReset = {
    confirmAndReset() {
        if(window.SoundEffects) SoundEffects.playSystemClick();
        
        // رسالة التحذير الأولى
        const firstConfirm = confirm("⚠️ تحذير أمني سيادي: هل أنت متأكد أنك تريد مسح جميع البيانات؟\n(سيعود المستوى إلى 1، وتفقد كل الذهب، الخبرة، المهام، والسجلات ولن يمكنك استرجاعها).");
        if (!firstConfirm) return;

        // رسالة التأكيد النهائية
        const secondConfirm = confirm("‼️ تأكيد نهائي: هذه العملية ستعيد النظام إلى نقطة الصفر. هل تريد تنفيذ 'مسح الذاكرة'؟");
        if (!secondConfirm) return;

        // قائمة المفاتيح المخزنة في النظام لمسحها
        const keysToReset = [
            'monarch_system_data', 
            'sovereign_active_quest', 
            'directive_start_time', 
            'sovereign_active_program', 
            'SL_QUESTS', 
            'sovereign_system_logs',
            'sovereign_titles_index'
        ];

        // تنفيذ المسح
        keysToReset.forEach(key => localStorage.removeItem(key));

        // مسح أي تخزين مؤقت للألقاب والمقايضات
        Object.keys(localStorage).forEach(key => {
            if (key.startsWith('title_cache_')) {
                localStorage.removeItem(key);
            }
        });

        alert("🔄 تم مسح الذاكرة وإعادة ضبط النظام بالكامل. سيتم إعادة تشغيل الواجهة.");
        
        // إعادة تحميل الصفحة لتطبيق حالة الصفر
        window.location.reload();
    }
};

// ==========================================
// SOUND EFFECTS
// ==========================================
const SoundEffects = {
    track1: new Audio('SHADOWBORN.mp3'),
    track2: new Audio('Kingdom_of_Iron.mp3'),
    currentTrackNumber: null,
    isMusicPlaying: false,

    init() {
        this.track1.loop = true;
        this.track2.loop = true;
    },

    toggleMusic(trackNumber) {
        const icon1 = document.getElementById('musicIcon1');
        const icon2 = document.getElementById('musicIcon2');

        if (this.isMusicPlaying && this.currentTrackNumber === trackNumber) {
            this.stopAllAudio();
            return;
        }
        if (this.isMusicPlaying) this.stopAllAudio();

        this.isMusicPlaying = true;
        this.currentTrackNumber = trackNumber;

        if (trackNumber === 1) {
            this.track1.play().catch(err => console.log("Auto-play blocked:", err));
            if (icon1) icon1.textContent = '⏸️';
            if (icon2) icon2.textContent = '🎼';
        } else if (trackNumber === 2) {
            this.track2.play().catch(err => console.log("Auto-play blocked:", err));
            if (icon1) icon1.textContent = '🎵';
            if (icon2) icon2.textContent = '⏸️';
        }
    },

    stopAllAudio() {
        this.track1.pause(); this.track1.currentTime = 0;
        this.track2.pause(); this.track2.currentTime = 0;
        const icon1 = document.getElementById('musicIcon1');
        const icon2 = document.getElementById('musicIcon2');
        if (icon1) icon1.textContent = '🎵';
        if (icon2) icon2.textContent = '🎼';
        this.isMusicPlaying = false;
        this.currentTrackNumber = null;
    },

    playSystemClick() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
        } catch(e) {}
    },

    playSuccess() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.1);
                gain.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.3);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(ctx.currentTime + i * 0.1);
                osc.stop(ctx.currentTime + i * 0.1 + 0.3);
            });
        } catch(e) {}
    },

    playLevelUp() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [440, 554, 659, 880, 1108];
            notes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.15);
                gain.gain.setValueAtTime(0.08, ctx.currentTime + i * 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.4);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(ctx.currentTime + i * 0.15);
                osc.stop(ctx.currentTime + i * 0.15 + 0.4);
            });
        } catch(e) {}
    }
};

const DirectiveTimer = {
    startTime: null,
    timerInterval: null,
    isRunning: false,

    start(savedStartTime) {
        if (this.isRunning) return;
        this.startTime = savedStartTime || Date.now();
        this.isRunning = true;
        localStorage.setItem('directive_start_time', this.startTime.toString());
        this.update();
        this.timerInterval = setInterval(() => this.update(), 1000);
    },

    stop() {
        clearInterval(this.timerInterval);
        this.isRunning = false;
        this.startTime = null;
        localStorage.removeItem('directive_start_time');
    },

    update() {
        if (!this.startTime) return;
        const elapsed = Date.now() - this.startTime;
        const timerEl = document.getElementById('directiveTimer');
        const progressEl = document.getElementById('directiveProgressBar');
        if (timerEl) timerEl.textContent = this.formatTime(elapsed);
        if (progressEl) {
            const progress = Math.min((elapsed / (25 * 60 * 1000)) * 100, 100);
            progressEl.style.width = `${progress}%`;
        }
    },

    formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const hours = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
        const minutes = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
        const seconds = (totalSeconds % 60).toString().padStart(2, '0');
        return `${hours}:${minutes}:${seconds}`;
    },

    reset() {
        this.stop();
        const timerEl = document.getElementById('directiveTimer');
        const progressEl = document.getElementById('directiveProgressBar');
        if (timerEl) timerEl.textContent = '00:00:00';
        if (progressEl) progressEl.style.width = '0%';
    }
};

// PLAYER STATE (RPG MECHANICS - DATA OVERWRITE SHIELD APPLIED)
// ==========================================
const PlayerState = {
    data: {
        level: 1,
        xp: 20,
        gold: 0,
        ap: 0,
        stats: { str: 10, vit: 10, agi: 10, int: 10, sen: 10 },
        authority: 0,
        lethality: 0
    },

    init() {
        const saved = localStorage.getItem('monarch_system_data');
        if (saved) {
            try { 
                const parsedData = JSON.parse(saved);
                // دمج الخصائص الرئيسية مع الحفاظ على البيانات العميقة المتشعبة (stats وغيرها)
                this.data = { 
                    ...this.data, 
                    ...parsedData,
                    stats: { ...this.data.stats, ...(parsedData.stats || {}) }
                }; 
            } catch(e) {}
        }
        this.updateDynamicStats();
        this.updateUI();
        this.startScheduleSync();
    },

    updateDynamicStats() {
        const now = new Date();
        const minutesPassed = (now.getHours() * 60) + now.getMinutes();
        const fatiguePercentage = Math.floor((minutesPassed / 1440) * 100);

        const baseHP = 1000;
        const maxHP = baseHP + (this.data.level * 100) + (this.data.stats.vit * 50);
        const baseMP = 500;
        const maxMP = baseMP + (this.data.level * 50) + (this.data.stats.int * 40);

        if(document.getElementById('fatigueText')) document.getElementById('fatigueText').textContent = fatiguePercentage;
        if(document.getElementById('fatigueBar')) document.getElementById('fatigueBar').style.width = `${fatiguePercentage}%`;
        if(document.getElementById('hpText')) document.getElementById('hpText').textContent = `${maxHP}/${maxHP}`;
        if(document.getElementById('hpBar')) document.getElementById('hpBar').style.width = '85%';
        if(document.getElementById('mpText')) document.getElementById('mpText').textContent = `${maxMP}/${maxMP}`;
        if(document.getElementById('mpBar')) document.getElementById('mpBar').style.width = '72%';
    },

    analyzeQuestAndReward(questTitle) {
        let title = questTitle.toLowerCase();
        let statGained = '';
        if (title.match(/عضلات|قوة|مواي تاي|جوجيتسو|ضغط|أوزان/)) { this.data.stats.str += 1; statGained = 'STR'; }
        else if (title.match(/برمجة|ذكاء|دراسة|تطوير|كود|ai|اصطناعي/)) { this.data.stats.int += 1; statGained = 'INT'; }
        else if (title.match(/جري|سرعة|ركض/)) { this.data.stats.agi += 1; statGained = 'AGI'; }
        else if (title.match(/تأمل|تركيز|ملاحظة/)) { this.data.stats.sen += 1; statGained = 'PER'; }
        else if (title.match(/تحمل|صيام|عمل/)) { this.data.stats.vit += 1; statGained = 'VIT'; }
        else { this.data.ap += 1; statGained = 'AP (Free Point)'; }
        this.save();
        return statGained;
    },

    spendAP(statName) {
        if (this.data.ap > 0 && this.data.stats[statName] !== undefined) {
            this.data.ap -= 1;
            this.data.stats[statName] += 1;
            if (typeof SoundEffects !== 'undefined') SoundEffects.playSystemClick();
            if (typeof Toast !== 'undefined') Toast.show(`Stat ${statName.toUpperCase()} structurally upgraded!`, 'success');
            this.save();
        }
    },

    addXP(amount) {
        this.data.xp += amount;
        if (this.data.xp < 0) {
            if (this.data.level > 1) {
                this.data.level -= 1;
                this.data.xp += (this.data.level * 100);
            } else {
                this.data.xp = 0;
            }
        }
        const xpNeeded = this.data.level * 100;
        if (this.data.xp >= xpNeeded) {
            this.data.xp -= xpNeeded;
            this.levelUp();
        }
        this.save();
    },

    addGold(amount) { 
        this.data.gold += amount; 
        this.save();
    },

    addStat(statName, amount) {
        if (this.data.stats[statName] !== undefined) { 
            this.data.stats[statName] += amount;
            this.save(); 
        }
    },

    levelUp() {
        this.data.level += 1;
        this.data.ap += 3;
        Object.keys(this.data.stats).forEach(k => this.data.stats[k] += 1);
        this.save();

        if (typeof SoundEffects !== 'undefined') SoundEffects.playLevelUp();
        if (typeof confetti !== 'undefined') confetti({ particleCount: 300, spread: 120, origin: { y: 0.6 }, colors: ['#00f0ff', '#9d4edd', '#ffffff'] });

        const modal = document.getElementById('milestoneModal');
        if(modal) {
            document.getElementById('milestoneOldLevel').textContent = this.data.level - 1;
            document.getElementById('milestoneLevelText').textContent = this.data.level;
            document.getElementById('milestoneMessage').innerHTML = `State recovered.<br>All stats increased by +1<br>Acquired 3 Free AP.`;
            modal.classList.remove('hidden');
        }
    },

    startScheduleSync() {
        const updateSystemBroadcast = () => {
            const now = new Date();
            const currentTimeDec = now.getHours() + now.getMinutes() / 60;
            let msg = "[SYSTEM STATUS]: Searching current operational sector...";
            if (currentTimeDec >= 5 && currentTimeDec < 6) msg = "⚡ ACTIVE BLOCK: [SPIRITUAL CORE] -> Quran recitation & Fajr Adhkar.";
            else if (currentTimeDec >= 6 && currentTimeDec < 8.5) msg = "💻 ACTIVE BLOCK: [DEEP ARCHITECTURE DEV] -> Programming AiMoha Project.";
            else if (currentTimeDec >= 8.5 && currentTimeDec < 10.5) msg = "🤖 ACTIVE BLOCK: [AI ACADEMY] -> Machine Learning training.";
            else if (currentTimeDec >= 15 && currentTimeDec < 16.5) msg = "🏋️ ACTIVE BLOCK: [EVOLUTIONARY PPL ENGINE] -> Physical conditioning.";
            else if (currentTimeDec >= 20.5 && currentTimeDec < 21.5) msg = "🧠 ACTIVE BLOCK: [COGNITIVE DOMINATION] -> Brain Dungeons active.";
            else msg = "⚔️ ACTIVE BLOCK: [FLEXIBLE ENGAGEMENT] -> Check operational charter.";
            if(document.getElementById('motivationalQuote')) document.getElementById('motivationalQuote').textContent = msg;
        };
        updateSystemBroadcast();
        setInterval(updateSystemBroadcast, 60000);
    },

    save() {
        // 🛡️ Safe Merge Protocol: يمنع الكتابة الفوقية والمسح العرضي للبيانات التي يتم تحديثها في الملفات الأخرى
        try {
            const savedData = JSON.parse(localStorage.getItem('monarch_system_data') || '{}');
            this.data = { 
                ...savedData, 
                ...this.data, 
                stats: { ...(savedData.stats || {}), ...this.data.stats } 
            };
        } catch(e) {
            console.error("System save error", e);
        }
        
        localStorage.setItem('monarch_system_data', JSON.stringify(this.data));
        this.updateDynamicStats();
        this.updateUI();
    },

    updateUI() {
        ['str', 'vit', 'agi', 'int', 'sen'].forEach(stat => {
            if(document.getElementById(`stat-${stat}`)) document.getElementById(`stat-${stat}`).textContent = this.data.stats[stat];
        });
        if(document.getElementById('playerGold')) document.getElementById('playerGold').textContent = this.data.gold;
        if(document.getElementById('availablePoints')) document.getElementById('availablePoints').textContent = this.data.ap;
        if(document.getElementById('currentLevel')) document.getElementById('currentLevel').textContent = this.data.level;

        const nextLevelXP = this.data.level * 100;
        if(document.getElementById('xpText')) document.getElementById('xpText').textContent = `${this.data.xp} / ${nextLevelXP}`;

        const xpPercent = Math.min((this.data.xp / nextLevelXP) * 100, 100);
        if(document.getElementById('xpBar')) document.getElementById('xpBar').style.width = `${xpPercent}%`;

        document.querySelectorAll('.ap-btn').forEach(btn => {
            btn.classList.toggle('hidden', this.data.ap <= 0);
        });
    }
};

const QuestSystem = {
    tasks: [],
    filter: 'all', // 'all' | 'active'
    init() {
        const saved = localStorage.getItem('SL_QUESTS');
        this.tasks = saved ? JSON.parse(saved) : [];
        this.render();
    },
    setFilter(mode) {
        this.filter = mode;
        this.render();
    },
    addTask() {
        if(window.SoundEffects) SoundEffects.playSystemClick();
        const inp = document.getElementById('taskInput');
        const prio = document.getElementById('prioritySelect').value;
        const statSelect = document.getElementById('statSelect').value;
        if(!inp || !inp.value.trim()) return;
        const task = { id: Date.now(), text: inp.value.trim(), priority: prio, completed: false, stat: statSelect, createdAt: new Date().toISOString() };
        this.tasks.unshift(task);
        inp.value = '';
        this.save();
        this.render();
        Toast.show('Quest deployed to system window', 'success');
    },
    toggleTask(id) {
        const taskIndex = this.tasks.findIndex(t => t.id === id);
        if (taskIndex === -1) return;
        const task = this.tasks[taskIndex];
        let xpReward = task.priority === 'high' ? 100 : task.priority === 'medium' ? 50 : 20;
        let goldReward = task.priority === 'high' ? 30 : task.priority === 'medium' ? 15 : 5;
        let authorityReward = task.priority === 'high' ? 10 : task.priority === 'medium' ? 5 : 2;

        if (!task.completed) {
            task.completed = true;
            if(window.PlayerState) {
                PlayerState.data.authority = (PlayerState.data.authority || 0) + authorityReward;
                PlayerState.addXP(xpReward);
                PlayerState.addGold(goldReward);
                PlayerState.addStat(task.stat || 'int', 1);
            }
            Toast.show(`Quest Cleared! +${xpReward} EXP`, 'success');
            if(window.SoundEffects) SoundEffects.playSuccess();
            if(typeof confetti === 'function') confetti({particleCount: 80, spread: 60, origin: {y: 0.7}, colors: ['#00f0ff','#9d4edd']});
        } else {
            task.completed = false;
            if(window.PlayerState) {
                PlayerState.data.authority = Math.max(0, (PlayerState.data.authority || 0) - authorityReward);
                PlayerState.addXP(-xpReward);
                PlayerState.addGold(-goldReward);
                if (PlayerState.data.gold < 0) PlayerState.data.gold = 0;
                PlayerState.addStat(task.stat || 'int', -1);
            }
            Toast.show(`Quest Reversed! Rewards Deducted.`, 'error');
            if(window.SoundEffects) SoundEffects.playSystemClick();
        }
        this.save();
        this.render();
    },
    deleteTask(id) {
        if(window.SoundEffects) SoundEffects.playSystemClick();
        this.tasks = this.tasks.filter(t => t.id !== id);
        this.save();
        this.render();
    },
    render() {
        const container = document.getElementById('taskContainer');
        const titleEl = document.getElementById('taskListTitle');
        const backBtn = document.getElementById('backToAllBtn');
        if(!container) return;
        container.innerHTML = '';

        // Update title and back button based on filter
        if (titleEl) {
            titleEl.textContent = this.filter === 'active' ? '⚔️ ACTIVE ENGAGEMENTS (Incomplete)' : '⚔️ Active Directives Log';
            titleEl.className = this.filter === 'active' 
                ? 'font-black text-sm text-amber-400 tracking-wide uppercase sys-font' 
                : 'font-black text-sm text-[var(--sys-cyan)] tracking-wide uppercase sys-font';
        }
        if (backBtn) {
            backBtn.classList.toggle('hidden', this.filter !== 'active');
        }

        let activeCount = 0; let completedCount = 0;

        // Filter tasks
        const displayTasks = this.filter === 'active' 
            ? this.tasks.filter(t => !t.completed) 
            : this.tasks;

        if (displayTasks.length === 0) {
            const emptyMsg = this.filter === 'active' 
                ? '<p>[NO INCOMPLETE ENGAGEMENTS DETECTED]</p><p class="text-[10px] mt-2">All directives have been cleared.</p>'
                : '<p>[NO ACTIVE QUESTS DETECTED]</p>';
            container.innerHTML = `<div class="text-center py-10 opacity-30 sys-font">${emptyMsg}</div>`;
            this.updateStatsUI(0, 0, 0);
            return;
        }
        const statColors = { 'int': 'text-[var(--sys-cyan)]', 'str': 'text-rose-500', 'vit': 'text-emerald-500', 'agi': 'text-sky-400', 'sen': 'text-[var(--sys-purple)]' };
        displayTasks.forEach(task => {
            task.completed ? completedCount++ : activeCount++;
            const escapedText = task.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const div = document.createElement('div');
            div.className = `task-card flex items-center justify-between p-4 bg-slate-900/80 backdrop-blur-sm border-y border-y-slate-800 transition-all ${task.completed ? 'completed opacity-50' : ''}`;
            div.innerHTML = `
                <div class="flex items-center gap-4">
                    <button onclick="QuestSystem.toggleTask(${task.id})" class="w-6 h-6 rounded border-2 border-[var(--sys-cyan)] flex items-center justify-center hover:bg-[var(--sys-cyan)] hover:bg-opacity-20 transition-colors ${task.completed ? 'bg-[var(--sys-cyan)]' : ''}">
                        ${task.completed ? '<span class="text-black text-xs font-black">✓</span>' : ''}
                    </button>
                    <div>
                        <div class="font-bold text-white text-sm ${task.completed ? 'line-through text-slate-500' : ''}">${escapedText}</div>
                        <div class="flex gap-2 mt-1">
                            <span class="sys-font text-[10px] px-2 py-0.5 border border-slate-700 bg-black/50 ${statColors[task.stat || 'int']} uppercase tracking-widest">+1 ${(task.stat || 'int').toUpperCase()}</span>
                            <span class="sys-font text-[10px] px-2 py-0.5 border border-slate-700 bg-black/50 text-amber-400 uppercase tracking-widest">RANK: ${(task.priority || 'medium').toUpperCase()}</span>
                        </div>
                    </div>
                </div>
                <button onclick="QuestSystem.deleteTask(${task.id})" class="text-slate-600 hover:text-rose-500 transition-colors p-2">🗑️</button>
            `;
            container.appendChild(div);
        });
        const lethalityRate = Math.round((completedCount / this.tasks.length) * 100);
        if(window.PlayerState) {
            PlayerState.data.lethality = lethalityRate;
            PlayerState.save();
        }
        this.updateStatsUI(activeCount, this.tasks.length, lethalityRate);

        if(document.getElementById('cnt-active-val')) document.getElementById('cnt-active-val').textContent = active;
        if(document.getElementById('stat-lethality')) document.getElementById('stat-lethality').textContent = `${lethality}%`;
    },
    save() { localStorage.setItem('SL_QUESTS', JSON.stringify(this.tasks)); }
};

const Pomodoro = {
    defaultTime: parseInt(localStorage.getItem('SL_SYS_TIMER')) || (5 * 3600),
    timeLeft: 0, timer: null, isRunning: false,
    init() { this.timeLeft = this.defaultTime; this.updateUI(); },
    saveSettings() {
        const h = parseInt(document.getElementById('inputHours').value) || 0;
        const m = parseInt(document.getElementById('inputMinutes').value) || 0;
        const tot = (h * 3600) + (m * 60);
        if (tot > 0) {
            this.defaultTime = tot;
            localStorage.setItem('SL_SYS_TIMER', this.defaultTime.toString());
            document.getElementById('timerModal').classList.add('hidden');
            clearInterval(this.timer); this.timeLeft = this.defaultTime; this.isRunning = false;
            this.toggle();
        }
    },
    toggle() {
        if(typeof SoundEffects !== 'undefined') SoundEffects.playSystemClick();
        const btn = document.getElementById('timerBtn');
        const st = document.getElementById('timerStatus');
        if (this.isRunning) {
            clearInterval(this.timer);
            btn.textContent = 'START'; btn.classList.remove('bg-rose-600/30');
            st.textContent = 'PAUSED'; st.className = 'sys-font text-[9px] px-2 py-0.5 bg-amber-900 border border-amber-600 text-amber-300 uppercase';
        } else {
            if (this.timeLeft <= 0) this.timeLeft = this.defaultTime;
            this.timer = setInterval(() => { if (this.timeLeft > 0) { this.timeLeft--; this.updateUI(); } else { this.finish(); } }, 1000);
            btn.textContent = '⏸️'; btn.classList.add('bg-rose-600/30');
            st.textContent = 'IN COMBAT'; st.className = 'sys-font text-[9px] px-2 py-0.5 bg-rose-900 border border-rose-600 text-rose-300 uppercase animate-pulse';
        }
        this.isRunning = !this.isRunning;
    },
    reset() {
        if(typeof SoundEffects !== 'undefined') SoundEffects.playSystemClick();
        clearInterval(this.timer);
        this.timeLeft = this.defaultTime; this.isRunning = false;
        const btn = document.getElementById('timerBtn'); btn.textContent = 'START'; btn.classList.remove('bg-rose-600/30');
        const st = document.getElementById('timerStatus');
        st.textContent = 'IDLE'; st.className = 'sys-font text-[9px] px-2 py-0.5 bg-slate-800 border border-slate-600 text-slate-300 uppercase';
        this.updateUI();
    },
    finish() {
        clearInterval(this.timer);
        if(typeof SoundEffects !== 'undefined') SoundEffects.playSuccess();
        if (typeof confetti !== 'undefined') confetti({ particleCount: 100, colors: ['#00f0ff'] });
        this.reset();
    },
    updateUI() {
        const h = Math.floor(this.timeLeft / 3600).toString().padStart(2, '0');
        const m = Math.floor((this.timeLeft % 3600) / 60).toString().padStart(2, '0');
        const s = (this.timeLeft % 60).toString().padStart(2, '0');
        if(document.getElementById('timerDisplay')) document.getElementById('timerDisplay').textContent = `${h}:${m}:${s}`;
    }
};

const Milestone = {
    hide() {
        document.getElementById('milestoneModal').classList.add('hidden');
        if(typeof SoundEffects !== 'undefined') SoundEffects.playSystemClick();
    }
};
    </script>

    // تفعيل الهالة السيادية المحفوظة فور تحميل الصفحة
    const savedAura = localStorage.getItem('sovereign_aura_color');
    if(savedAura) {
        document.documentElement.style.setProperty('--sys-cyan', savedAura);
        document.documentElement.style.setProperty('--sys-cyan-glow', savedAura + '99');
        // للاندماج المطلق يمكنك توحيد اللونين الأساسيين

    }
</script>
