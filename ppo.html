<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام العاهل - الأرشيف السماوي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --system-blue: #00e5ff;
            --system-dark: rgba(10, 14, 23, 0.98);
            --system-border: #0077ff;
            --system-glow: 0 0 15px rgba(0, 229, 255, 0.4);
            --system-text: #e0f7fa;
            --gold-accent: #ffd700;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #050505;
            background-image: radial-gradient(circle at top, #0a1128 0%, #000000 100%);
            color: var(--system-text);
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* تخصيص شريط التمرير */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--system-blue);
            border-radius: 10px;
        }

        /* نافذة النظام المتجاوبة */
        .system-window {
            background: var(--system-dark);
            border: 1px solid var(--system-border);
            border-radius: 8px;
            box-shadow: var(--system-glow), inset 0 0 20px rgba(0, 119, 255, 0.1);
            width: 100%;
            max-width: 750px; /* زيادة العرض قليلاً لتستغل الشاشات الكبيرة */
            height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .system-header {
            text-align: center;
            font-family: 'Share Tech Mono', 'Cairo', monospace;
            font-size: 1.1rem;
            color: var(--system-blue);
            letter-spacing: 2px;
            padding: 15px;
            border-bottom: 1px solid rgba(0, 229, 255, 0.3);
            background: rgba(0, 229, 255, 0.05);
            text-shadow: 0 0 8px var(--system-blue);
        }

        .search-container {
            padding: 12px 15px;
            border-bottom: 1px dashed var(--system-border);
        }

        .system-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--system-blue);
            color: var(--system-blue);
            padding: 10px 15px;
            border-radius: 4px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .system-input:focus {
            box-shadow: var(--system-glow);
        }

        /* قائمة السور الديناميكية الذكية */
        .surah-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            list-style: none;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .surah-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 229, 255, 0.15);
            padding: 12px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .surah-card:hover {
            background: rgba(0, 229, 255, 0.08);
            border-color: var(--system-blue);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
            transform: translateY(-2px);
        }

        .surah-number {
            font-family: 'Share Tech Mono', monospace;
            color: rgba(0, 229, 255, 0.6);
            font-size: 0.85rem;
        }

        /* واجهة القراءة */
        .reader-view {
            display: none;
            flex-direction: column;
            height: 100%;
            background: var(--system-dark);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
        }

        .reader-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid var(--system-border);
            background: rgba(0, 0, 0, 0.8);
            gap: 10px;
        }

        #current-surah-title {
            font-weight: bold;
            color: var(--system-blue);
            font-size: 1.1rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-system {
            background: transparent;
            border: 1px solid var(--system-blue);
            color: var(--system-blue);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-system:hover {
            background: rgba(0, 229, 255, 0.2);
            box-shadow: var(--system-glow);
        }

        .ayah-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px 25px;
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            line-height: 2.3;
            text-align: justify;
            word-spacing: 2px;
        }

        .ayah-text {
            display: inline;
            transition: color 0.2s;
        }

        .ayah-text:hover {
            color: var(--system-blue);
        }

        .ayah-number {
            display: inline-block;
            width: 28px;
            height: 28px;
            line-height: 26px;
            text-align: center;
            border: 1px solid var(--gold-accent);
            border-radius: 50%;
            font-size: 0.8rem;
            color: var(--gold-accent);
            margin: 0 6px;
            font-family: 'Cairo', sans-serif;
        }

        .audio-player {
            padding: 12px;
            border-top: 1px solid var(--system-border);
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
        }

        audio {
            width: 100%;
            height: 36px;
            outline: none;
        }

        /* الاستدعاءات البرمجية للتجاوب (Media Queries) */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }
            .system-window {
                height: 100vh;
                width: 100vw;
                border: none;
                border-radius: 0;
            }
            .surah-list {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 8px;
                padding: 10px;
            }
            .ayah-container {
                font-size: 1.4rem;
                line-height: 2;
                padding: 15px;
            }
            .btn-system {
                padding: 5px 8px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 400px) {
            .surah-list {
                grid-template-columns: 1fr; /* عمود واحد للهواتف الصغيرة جداً */
            }
            #current-surah-title {
                font-size: 0.95rem;
            }
        }

        /* نظام الإشعارات وشاشة التحميل */
        .system-toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 119, 255, 0.1);
            border: 1px solid var(--system-blue);
            color: var(--system-blue);
            padding: 10px 20px;
            border-radius: 4px;
            box-shadow: var(--system-glow);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            font-size: 0.9rem;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .system-toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--system-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            color: var(--system-blue);
            font-family: 'Share Tech Mono', monospace;
            display: none;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="system-window">
        <div id="main-view" style="display: flex; flex-direction: column; height: 100%;">
            <div class="system-header">[ SYSTEM ARCHIVE : AL-QURAN ] 
            </div>
            <div class="fixed top-6 left-6 z-50 flex gap-4 items-center color: #dedede; /* لون أرجواني سيادي */
    text-shadow: 0 0 8px rgb(133, 133, 133);
    font-size: 0.85rem;
    font-weight: bold;
    margin-left: 10px;
    padding: 3px 10px;
    
    
    
    letter-spacing: 1px;">
    <button onclick="SoundEffects.toggleMusic(1)" class="w-10 h-10 flex items-center justify-center bg-slate-900/80 backdrop-blur border border-slate-700 hover:border-[var(--sys-cyan)] text-[var(--sys-cyan)] rounded-full transition-all shadow-[0_0_10px_rgba(0,0,0,0.5)]">
        <span id="musicIcon1" class="text-lg animate-pulse">🎵</span>
    </button>
    <button onclick="SoundEffects.toggleMusic(2)" class="w-10 h-10 flex items-center justify-center bg-slate-900/80 backdrop-blur border border-slate-700 hover:border-[var(--sys-cyan)] text-[var(--sys-cyan)] rounded-full transition-all shadow-[0_0_10px_rgba(0,0,0,0.5)]">
        <span id="musicIcon2" class="text-lg animate-pulse">🎼</span>
    </button>
    <a href="https://aissaouimohamad62-glitch.github.io/proto/" target="_blank" class="px-4 py-2 bg-slate-900/80 backdrop-blur border border-slate-700 hover:border-[var(--sys-cyan)] text-white text-xs font-black uppercase tracking-widest rounded flex items-center gap-2 shadow-[0_0_10px_rgba(0,0,0,0.5)] transition-all">
        <span>𝐏𝐎𝐑𝐓𝐅𝐎𝐋𝐈𝐎</span> <span class="text-[var(--sys-cyan)]">📍</span>
    </a>
    <a href="https://aissaouimohamad62-glitch.github.io/booksoverhaul.dz/" target="_blank" class="px-4 py-2 bg-slate-900/80 backdrop-blur border border-slate-700 hover:border-[var(--sys-cyan)] text-white text-xs font-black uppercase tracking-widest rounded flex items-center gap-2 shadow-[0_0_10px_rgba(0,0,0,0.5)] transition-all">
        <span>𝐋𝐈𝐁𝐑𝐀𝐑𝐘</span> <span class="text-[var(--sys-cyan)]">📒</span>
    </a>
    
</div>
           <div > <button onclick="window.location.href='index.html';" class="system-header"  >
                    <span>↩</span> <span> 🏠 DASHBOARD العودة للرئيسية</span>
                </button></div>

                
            
            <div class="search-container">
                <input type="text" id="search-input" class="system-input" placeholder="> أدخل اسم السورة للبحث اللحظي..." onkeyup="filterSurahs()">
            </div>

            <div class="search-container" style="padding-top:0; border:none;">
                <button class="btn-system" onclick="loadBookmark()" style="width: 100%; border-color: var(--gold-accent); color: var(--gold-accent);">
                    [ استرجاع نقطة الحفظ السابقة ]
                </button>
            </div>

            <ul class="surah-list" id="surah-list">
                </ul>
        </div>

        <div class="reader-view" id="reader-view">
            <div class="reader-header">
                <button class="btn-system" onclick="closeReader()">[ عودة ]</button>
                <div id="current-surah-title"></div>
                <button class="btn-system" onclick="saveBookmark()">[ حفظ التقدم ]</button>
            </div>
            
            <div class="ayah-container" id="ayah-container">
                </div>

            <div class="audio-player">
                <audio id="quran-audio" controls>
                    <source src="" type="audio/mpeg">
                </audio>
            </div>
        </div>

        <div class="loading-overlay" id="loading">
            > DECODING DATA...
        </div>
    </div>

    <div class="system-toast" id="toast">[ تم حفظ تقدمك بنجاح ]</div>

    <script>
        const API_BASE = "https://api.alquran.cloud/v1";
        let allSurahs = [];
        let currentSurahId = null;

        document.addEventListener("DOMContentLoaded", async () => {
            showLoading(true);
            try {
                const response = await fetch(`${API_BASE}/surah`);
                const data = await response.json();
                allSurahs = data.data;
                renderSurahs(allSurahs);
            } catch (error) {
                console.error("Error:", error);
                showToast("فشل في الاتصال بقاعدة البيانات السماوية");
            }
            showLoading(false);
        });

        function renderSurahs(surahs) {
            const listElement = document.getElementById("surah-list");
            listElement.innerHTML = "";
            
            surahs.forEach(surah => {
                const li = document.createElement("li");
                li.className = "surah-card";
                li.onclick = () => openSurah(surah.number, surah.name);
                li.innerHTML = `
                    <span class="surah-number">${surah.number.toString().padStart(3, '0')}</span>
                    <span style="font-weight: bold;">${surah.name}</span>
                `;
                listElement.appendChild(li);
            });
        }

        function filterSurahs() {
            const query = document.getElementById("search-input").value;
            const cleanQuery = query.replace(/[\u064B-\u065F]/g, '');
            
            const filtered = allSurahs.filter(surah => {
                const cleanName = surah.name.replace(/[\u064B-\u065F]/g, '');
                return cleanName.includes(cleanQuery);
            });
            renderSurahs(filtered);
        }

        async function openSurah(number, name) {
            showLoading(true);
            currentSurahId = number;
            document.getElementById("current-surah-title").innerText = name;
            
            try {
                const response = await fetch(`${API_BASE}/surah/${number}/ar.alafasy`);
                const data = await response.json();
                const ayahs = data.data.ayahs;

                const container = document.getElementById("ayah-container");
                container.innerHTML = "";

                if (number !== 1 && number !== 9) {
                    container.innerHTML = `<div style="text-align: center; margin-bottom: 20px; color: var(--system-blue); font-size: 1.3rem;">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;
                }

                ayahs.forEach(ayah => {
                    let text = ayah.text;
                    if (number !== 1 && ayah.numberInSurah === 1) {
                        text = text.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "").trim();
                    }

                    container.innerHTML += `
                        <span class="ayah-text" id="ayah-${ayah.numberInSurah}" onclick="playAyah('${ayah.audio}')" style="cursor:pointer;" title="انقر للاستماع للآية">
                            ${text}
                        </span>
                        <span class="ayah-number">${ayah.numberInSurah}</span>
                    `;
                });

                const audioPlayer = document.getElementById("quran-audio");
                const surahFormatted = number.toString().padStart(3, '0');
                audioPlayer.src = `https://server8.mp3quran.net/afs/${surahFormatted}.mp3`;

                document.getElementById("main-view").style.display = "none";
                document.getElementById("reader-view").style.display = "flex";

                // جعل السورة تبدأ من الأعلى دائماً عند الفتح
                document.getElementById("ayah-container").scrollTop = 0;

            } catch (error) {
                console.error("Error:", error);
                showToast("حدث خطأ أثناء فك تشفير البيانات");
            }
            showLoading(false);
        }

        function closeReader() {
            document.getElementById("quran-audio").pause();
            document.getElementById("reader-view").style.display = "none";
            document.getElementById("main-view").style.display = "flex";
            currentSurahId = null;
        }

        function playAyah(audioUrl) {
            const audioPlayer = document.getElementById("quran-audio");
            audioPlayer.src = audioUrl;
            audioPlayer.play();
        }

        function saveBookmark() {
            if (!currentSurahId) return;
            
            const bookmarkData = {
                surahId: currentSurahId,
                surahName: document.getElementById("current-surah-title").innerText
            };
            
            localStorage.setItem("monarch_quran_bookmark", JSON.stringify(bookmarkData));
            showToast("[ تم تحديث نقطة الحفظ بنجاح ]");
        }

        function loadBookmark() {
            const saved = localStorage.getItem("monarch_quran_bookmark");
            if (saved) {
                const data = JSON.parse(saved);
                openSurah(data.surahId, data.surahName);
                showToast("[ تم استرجاع البيانات بنجاح ]");
            } else {
                showToast("[ لا توجد نقطة حفظ سابقة ]");
            }
        }

        function showLoading(show) {
            document.getElementById("loading").style.display = show ? "flex" : "none";
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }
    </script>
</body>
</html>
